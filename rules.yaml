# =========================================================================
# SECTION 1: GLOBAL LISTS
# Reusable path, name, and config patterns used by security macros and rules.
# =========================================================================

lists:
  # Sensitive paths that agents should not be read from or written to.
  - name: sensitive_paths
    items:
      - /etc/
      - /private/etc/
      - /root/
      - /var/
      - /private/var/
      - /boot/
      - /proc/
      - /sys/

  # Individual sensitive files that often contain API keys, credentials, or session tokens.
  - name: sensitive_file_names
    items:
      - .env
      - .env.local
      - .env.production
      - .netrc
      - .npmrc
      - credentials.json
      - token.json

  # Shell configuration files that execute commands automatically upon shell login.
  - name: shell_startup_files
    items:
      - .bashrc
      - .zshrc
      - .profile
      - .bash_profile
      - .zprofile
      - .bash_login
      - .bash_logout

  # Files where LLM agents read custom rules or instructions.
  - name: agent_instruction_files
    items:
      - .cursorrules
      - .windsurfrules
      - .aiderrules
      - AGENTS.md

  # Environment configuration file patterns.
  - name: env_file_names
    items:
      - .env
      - .envrc
      - .env.local
      - .env.development
      - .env.production
      - .env.staging
      - .env.test
      - .env.ci
      - .env.override

  # Package manager registry configuration files.
  - name: registry_config_files
    items:
      - .npmrc
      - .pypirc
      - pip.conf
      - .pnpmrc
      - .yarnrc.yml

# =========================================================================
# SECTION 2: MACROS
# Common Expression Language (CEL) building blocks for security validation.
# =========================================================================

macros:
  # Check if the tool being used is a native write/edit tool.
  - name: is_claude_write_tool
    expression: tool.name in ["Write", "Edit"]

  # Check if the tool is Codex patch tool writing/modifying code.
  - name: is_codex_patch_write
    expression: tool.name == "apply_patch" && tool.patch_op in ["Add", "Update", "Delete", "Move"]

  # General helper to identify any write operation.
  - name: is_write_tool
    expression: is_claude_write_tool || is_codex_patch_write

  # Checks if the target file path resides in a sensitive location.
  - name: is_sensitive_path
    expression: >
      sensitive_paths.exists(p, tool.real_file_path.startsWith(p)) ||
      tool.real_file_path.contains("/.ssh/") ||
      tool.real_file_path.contains("/.gnupg/") ||
      tool.real_file_path.contains("/.aws/") ||
      tool.real_file_path.contains("/.azure/") ||
      tool.real_file_path.contains("/.config/gcloud/") ||
      tool.real_file_path.contains("/.kube/") ||
      tool.real_file_path.contains("/.docker/") ||
      tool.file_name in sensitive_file_names

  # Checks if the target path is outside the workspace CWD.
  - name: is_outside_cwd
    expression: '!tool.real_file_path.startsWith(agent.real_cwd)'

  # Identifies Claude-specific data directory.
  - name: is_claude_data_path
    expression: tool.real_file_path.contains("/.claude/")

  # Identifies the Claude Code settings files that govern hooks and permissions.
  - name: is_claude_settings_path
    expression: >
      tool.real_file_path.endsWith("/.claude/settings.json") ||
      tool.real_file_path.endsWith("/.claude/settings.local.json")

  # Check tool input for known indicators of compromise (IOC) domains.
  - name: contains_ioc_domain
    expression: >
      tool.input.contains("pastebin.com") || tool.input.contains("transfer.sh") ||
      tool.input.contains("file.io") || tool.input.contains("termbin.com") ||
      tool.input.contains("ix.io") || tool.input.contains("glot.io") ||
      tool.input.contains("hastebin.com") || tool.input.contains("ghostbin.co")

  # Check shell command input for known IOC domains.
  - name: cmd_contains_ioc_domain
    expression: >
      tool.input_command.contains("pastebin.com") || tool.input_command.contains("transfer.sh") ||
      tool.input_command.contains("file.io") || tool.input_command.contains("termbin.com") ||
      tool.input_command.contains("ix.io") || tool.input_command.contains("glot.io") ||
      tool.input_command.contains("hastebin.com") || tool.input_command.contains("ghostbin.co")

  # Identifies agent settings configuration files that control sandboxing.
  - name: is_agent_sandbox_config
    expression: >
      tool.real_file_path.endsWith("/.claude/settings.json") ||
      tool.real_file_path.endsWith("/.claude/settings.local.json") ||
      tool.real_file_path.endsWith("/.codex/config.toml") ||
      tool.real_file_path.endsWith("/.gemini/settings.json")

  # Sub-macros to detect parameters or options that disable sandboxing.
  - name: is_sandbox_disable_codex
    expression: tool.input.contains("danger-full-access")
  - name: is_sandbox_disable_enabled_false
    expression: tool.input.contains("sandbox") && tool.input.contains("false")
  - name: is_sandbox_toolsandboxing_false
    expression: tool.input.contains("toolSandboxing") && tool.input.contains("false")
  - name: is_sandbox_allow_unsandboxed
    expression: tool.input.contains("allowUnsandboxedCommands") && tool.input.contains("true")
  - name: is_sandbox_allow_unsandboxed_numeric
    expression: 'tool.input.contains("allowUnsandboxedCommands") && (tool.input.contains(":1") || tool.input.contains(": 1"))'
  - name: is_sandbox_disable_value_change
    expression: tool.input.contains("enabled") && tool.input.contains("false")
  - name: is_sandbox_disable_value_zero
    expression: 'tool.input.contains("enabled") && (tool.input.contains(":0") || tool.input.contains(": 0"))'
  - name: is_sandbox_disable_value_null
    expression: tool.input.contains("enabled") && tool.input.contains("null")
  - name: is_sandbox_disable_gemini_none
    expression: tool.input.contains("sandbox") && tool.input.contains("none")
  - name: is_sandbox_disable_gemini_disabled
    expression: tool.input.contains("sandbox") && tool.input.contains("disabled")

  # Aggregated macro to detect sandboxing configuration disabling in file writes.
  - name: is_sandbox_disable_content
    expression: >
      is_sandbox_disable_codex || is_sandbox_disable_enabled_false || is_sandbox_toolsandboxing_false ||
      is_sandbox_allow_unsandboxed || is_sandbox_allow_unsandboxed_numeric || is_sandbox_disable_value_change ||
      is_sandbox_disable_value_zero || is_sandbox_disable_value_null || is_sandbox_disable_gemini_none ||
      is_sandbox_disable_gemini_disabled

  # Checks if a shell command targets agent configuration paths.
  - name: is_bash_sandbox_settings_path
    expression: >
      tool.input_command.contains(".claude/settings.json") ||
      tool.input_command.contains(".claude/settings.local.json") ||
      tool.input_command.contains(".codex/config.toml") ||
      tool.input_command.contains(".gemini/settings.json")

  # Sub-macros to detect sandbox bypass attempts in shell commands.
  - name: is_bash_disable_codex
    expression: tool.input_command.contains("danger-full-access")
  - name: is_bash_disable_sandbox_false
    expression: tool.input_command.contains("sandbox") && tool.input_command.contains("false")
  - name: is_bash_disable_sandbox_false_pyfalse
    expression: tool.input_command.contains("sandbox") && tool.input_command.contains("False")
  - name: is_bash_disable_sandbox_null
    expression: tool.input_command.contains("sandbox") && tool.input_command.contains("null")
  - name: is_bash_disable_enabled_zero
    expression: 'tool.input_command.contains("enabled") && (tool.input_command.contains(":0") || tool.input_command.contains(": 0"))'
  - name: is_bash_disable_toolsandboxing_false
    expression: tool.input_command.contains("toolSandboxing") && tool.input_command.contains("false")
  - name: is_bash_disable_allow_unsandboxed
    expression: tool.input_command.contains("allowUnsandboxedCommands") && tool.input_command.contains("true")
  - name: is_bash_disable_allow_unsandboxed_numeric
    expression: 'tool.input_command.contains("allowUnsandboxedCommands") && (tool.input_command.contains(":1") || tool.input_command.contains(": 1"))'
  - name: is_bash_disable_sandbox_none
    expression: tool.input_command.contains("sandbox") && tool.input_command.contains("none")
  - name: is_bash_disable_sandbox_disabled
    expression: tool.input_command.contains("sandbox") && tool.input_command.contains("disabled")

  # Aggregated macro to detect sandboxing configuration disabling in shell commands.
  - name: is_bash_sandbox_disable_cmd
    expression: >
      is_bash_disable_codex || is_bash_disable_sandbox_false || is_bash_disable_sandbox_false_pyfalse ||
      is_bash_disable_sandbox_null || is_bash_disable_enabled_zero || is_bash_disable_toolsandboxing_false ||
      is_bash_disable_allow_unsandboxed || is_bash_disable_allow_unsandboxed_numeric ||
      is_bash_disable_sandbox_none || is_bash_disable_sandbox_disabled

  # Checks if shell commands attempt to replace configuration files via inline tools.
  - name: is_bash_settings_sed_write
    expression: tool.input_command.contains("sed") && tool.input_command.contains("-i") && is_bash_sandbox_settings_path
  - name: is_bash_settings_cp
    expression: tool.input_command.contains("cp ") && is_bash_sandbox_settings_path
  - name: is_bash_settings_mv
    expression: tool.input_command.contains("mv ") && is_bash_sandbox_settings_path

  # Aggregated macro for settings replacement.
  - name: is_bash_sandbox_settings_replace
    expression: is_bash_settings_sed_write || is_bash_settings_cp || is_bash_settings_mv

  # Checks if Codex parameters try to bypass approvals/sandboxes.
  - name: is_codex_bypass_flag
    expression: tool.input_command.contains("dangerously-bypass-approvals-&&-sandbox")
  - name: is_codex_bypass_flag_underscore
    expression: tool.input_command.contains("dangerously_bypass_approvals_and_sandbox")
  - name: is_codex_danger_flag
    expression: tool.input_command.contains("codex") && tool.input_command.contains("danger-full-access")

  # Aggregated macro for Codex bypass detection.
  - name: is_codex_sandbox_bypass
    expression: is_codex_bypass_flag || is_codex_bypass_flag_underscore || is_codex_danger_flag

  # Detects Gemini sandbox bypass settings.
  - name: is_gemini_env_none
    expression: tool.input_command.contains("GEMINI_SANDBOX") && tool.input_command.contains("none")
  - name: is_gemini_env_false
    expression: tool.input_command.contains("GEMINI_SANDBOX") && tool.input_command.contains("false")
  - name: is_gemini_env_disabled
    expression: tool.input_command.contains("GEMINI_SANDBOX") && tool.input_command.contains("disabled")
  - name: is_gemini_env_zero
    expression: tool.input_command.contains("GEMINI_SANDBOX") && (tool.input_command.contains("==0") || tool.input_command.contains("== 0"))

  # Aggregated macro for Gemini bypass detection.
  - name: is_gemini_sandbox_env_bypass
    expression: is_gemini_env_none || is_gemini_env_false || is_gemini_env_disabled || is_gemini_env_zero

  # Helper macro to check if tool is Bash.
  - name: is_bash
    expression: tool.name == "Bash"

  # Identifies command lines referencing credentials or API keys.
  - name: references_credential
    expression: >
      tool.input_command.contains(".aws/credentials") || tool.input_command.contains(".aws/config") ||
      tool.input_command.contains("/.ssh/id_rsa") || tool.input_command.contains("/.ssh/id_ed25519") ||
      tool.input_command.contains("/.ssh/id_ecdsa") || tool.input_command.contains("/.gnupg/") ||
      tool.input_command.contains("/.netrc") || tool.input_command.contains("/.npmrc") ||
      tool.input_command.contains("/.docker/config.json") || tool.input_command.contains("credentials.json") ||
      tool.input_command.contains("AWS_SECRET_ACCESS_KEY") || tool.input_command.contains("GITHUB_TOKEN") ||
      tool.input_command.contains("ANTHROPIC_API_KEY") || tool.input_command.contains("OPENAI_API_KEY")

  # Detects piping curl/wget content directly to shell interpreters.
  - name: is_pipe_to_shell
    expression: >
      tool.input_command.contains("| bash") || tool.input_command.contains("|bash") ||
      tool.input_command.contains("| sh") || tool.input_command.contains("|sh") ||
      tool.input_command.contains("| zsh") || tool.input_command.contains("|zsh") ||
      tool.input_command.contains("bash <(") || tool.input_command.contains("sh <(") ||
      tool.input_command.contains("| /bin/bash") || tool.input_command.contains("|/bin/bash") ||
      tool.input_command.contains("| /bin/sh") || tool.input_command.contains("|/bin/sh") ||
      tool.input_command.contains("| /usr/bin/bash") || tool.input_command.contains("|/usr/bin/bash") ||
      tool.input_command.contains("| /usr/bin/sh") || tool.input_command.contains("|/usr/bin/sh")

  # Detects base64 or hex decoding inline execution.
  - name: is_encoded_exec
    expression: >
      tool.input_command.contains("base64 -d") || tool.input_command.contains("base64 --decode") ||
      tool.input_command.contains("base64 -D") || tool.input_command.contains("openssl base64 -d") ||
      tool.input_command.contains("xxd -r") || tool.input_command.contains("python3 -c") ||
      tool.input_command.contains("python -c") || tool.input_command.contains("perl -e") ||
      tool.input_command.contains("ruby -e") || tool.input_command.contains("node -e") ||
      tool.input_command.contains("node --eval") || tool.input_command.contains("php -r")

  # Detects data exfiltration commands using curl or wget.
  - name: is_curl_exfil
    expression: >
      (tool.input_command.contains("curl ") || tool.input_command.contains("wget ")) &&
      (tool.input_command.contains(" -d ") || tool.input_command.contains(" --data") ||
       tool.input_command.contains(" -F ") || tool.input_command.contains(" --form") ||
       tool.input_command.contains(" -T ") || tool.input_command.contains(" --upload-file") ||
       tool.input_command.contains("@/tmp/") || tool.input_command.contains("@/var/") ||
       tool.input_command.contains("| curl") || tool.input_command.contains("| wget"))

  # Identifies highly destructive commands that can format partitions or gain root.
  - name: is_destructive_command
    expression: >
      tool.input_command.contains("dd if==") || tool.input_command.contains("dd of==") ||
      tool.input_command.contains("mkfs") || tool.input_command.contains("> /dev/sda") ||
      tool.input_command.contains("init 0") || tool.input_command.contains("sudo su") ||
      tool.input_command.contains("sudo -i")

  # Identifies commands likely meant to delete workspace or shut down the system.
  - name: is_likely_destructive_command
    expression: >
      tool.input_command.contains("rm -rf") || tool.input_command.contains("rm -fr") ||
      tool.input_command.contains("rm --recursive") || tool.input_command.contains("sudo rm ") ||
      tool.input_command.startsWith("shutdown -") || tool.input_command.startsWith("shutdown now") ||
      tool.input_command.startsWith("shutdown +") || tool.input_command.contains("; shutdown -") ||
      tool.input_command.contains("; shutdown now") || tool.input_command.contains("&& shutdown -") ||
      tool.input_command.contains("&& shutdown now") || tool.input_command.contains("| shutdown -") ||
      tool.input_command.contains("/sbin/shutdown") || tool.input_command.contains("sudo shutdown") ||
      tool.input_command.contains("systemctl poweroff") || tool.input_command.startsWith("reboot") ||
      tool.input_command.contains("; reboot") || tool.input_command.contains("&& reboot") ||
      tool.input_command.contains("/sbin/reboot") || tool.input_command.contains("sudo reboot") ||
      tool.input_command.contains("systemctl reboot") || tool.input_command.startsWith("halt") ||
      tool.input_command.contains("; halt") || tool.input_command.contains("&& halt") ||
      tool.input_command.contains("/sbin/halt") || tool.input_command.contains("sudo halt") ||
      tool.input_command.contains("systemctl halt")

  # Helper macro to identify harmless search/print commands.
  - name: is_pure_search_or_print_command
    expression: >
      (tool.input_command.startsWith("rg ") || tool.input_command.startsWith("grep ") ||
       tool.input_command.startsWith("ag ") || tool.input_command.startsWith("find ") ||
       tool.input_command.startsWith("git grep ") || tool.input_command.startsWith("git log ") ||
       tool.input_command.startsWith("git show ") || tool.input_command.startsWith("git diff") ||
       tool.input_command.startsWith("echo ") || tool.input_command.startsWith("printf ") ||
       tool.input_command.startsWith("cat ")) &&
      !tool.input_command.contains("&&") && !tool.input_command.contains("||") &&
      !tool.input_command.contains(";") && !tool.input_command.contains("$(") &&
      !tool.input_command.contains("`")

  # Identifies paths inside temporary folders.
  - name: is_tmp_path
    expression: >
      tool.real_file_path.startsWith("/tmp/") ||
      tool.real_file_path.startsWith("/var/tmp/") ||
      tool.real_file_path.startsWith("/dev/shm/")

  # Checks if the read tool is accessing cloud/system credential files.
  - name: is_read_credential_path
    expression: >
      tool.name == "Read" && tool.real_file_path != "" &&
      (tool.real_file_path.contains("/.aws/credentials") || tool.real_file_path.contains("/.aws/config") ||
       tool.real_file_path.contains("/.ssh/id_rsa") || tool.real_file_path.contains("/.ssh/id_ed25519") ||
       tool.real_file_path.contains("/.ssh/id_ecdsa") || tool.real_file_path.contains("/.gnupg/") ||
       tool.real_file_path.contains("/.netrc") || tool.real_file_path.contains("/.docker/config.json"))

  # Helper to identify reverse shells using mkfifo and netcat.
  - name: is_reverse_shell_mkfifo_nc
    expression: tool.input_command.contains("mkfifo") && tool.input_command.contains(" nc ")

  # Detects typical reverse shell invocation strings.
  - name: is_reverse_shell
    expression: >
      tool.input_command.contains("/dev/tcp/") || tool.input_command.contains(">&/dev/tcp") ||
      tool.input_command.contains(">& /dev/tcp") || tool.input_command.contains("bash -i") ||
      tool.input_command.contains("nc -e") || tool.input_command.contains("nc -c") ||
      tool.input_command.contains("ncat --exec") || tool.input_command.contains("ncat -e") ||
      tool.input_command.contains("socat exec:") || is_reverse_shell_mkfifo_nc ||
      tool.input_command.contains("exec 5<>")

  # Detects access attempts to cloud instance metadata API services.
  - name: is_imds_access
    expression: >
      (tool.input_command.contains("curl ") || tool.input_command.contains("wget ")) &&
      (tool.input_command.contains("169.254.169.254") || tool.input_command.contains("metadata.google.internal") ||
       tool.input_command.contains("metadata.azure.com") || tool.input_command.contains("fd00:ec2::254") ||
       tool.input_command.contains("2852039166") || tool.input_command.contains("0xa9fea9fe") ||
       tool.input_command.contains("0Xa9fea9fe") || tool.input_command.contains("0251.0376.0251.0376"))

  # Checks if commands try to compress/archive credential directories.
  - name: is_credential_archive
    expression: >
      (tool.input_command.contains("tar ") || tool.input_command.contains("zip ") ||
       tool.input_command.contains("gzip ") || tool.input_command.contains("7z ") ||
       tool.input_command.contains("rar ")) &&
      (tool.input_command.contains("/.aws") || tool.input_command.contains("/.ssh") ||
       tool.input_command.contains("/.gnupg") || tool.input_command.contains("/.kube") ||
       tool.input_command.contains("/.docker"))

  # Checks if commands attempt to build SSH tunnels or SOCKS proxies.
  - name: is_ssh_tunnel
    expression: tool.input_command.contains("ssh ") && (tool.input_command.contains(" -R ") || tool.input_command.contains(" -D ") || tool.input_command.contains(" -w "))

  # Identifies command scheduling changes (crontabs).
  - name: is_cron_persistence
    expression: tool.input_command.contains("crontab -") || tool.input_command.contains("| crontab") || tool.input_command.contains("/etc/cron")

  # History wiping indicators.
  - name: is_history_wipe_rm_bash
    expression: tool.input_command.contains("rm ") && tool.input_command.contains(".bash_history")
  - name: is_history_wipe_rm_zsh
    expression: tool.input_command.contains("rm ") && tool.input_command.contains(".zsh_history")
  - name: is_history_wipe_truncate
    expression: tool.input_command.contains("truncate ") && tool.input_command.contains("_history")
  - name: is_history_wipe
    expression: >
      tool.input_command.contains("history -c") || tool.input_command.contains("history -w") ||
      tool.input_command.contains("unset HISTFILE") || tool.input_command.contains("HISTSIZE==0") ||
      tool.input_command.contains("HISTFILESIZE==0") || is_history_wipe_rm_bash ||
      is_history_wipe_rm_zsh || is_history_wipe_truncate

  # Package registry publishing indicators.
  - name: is_package_publish
    expression: >
      tool.input_command.contains("npm publish") || tool.input_command.contains("twine upload") ||
      tool.input_command.contains("cargo publish") || tool.input_command.contains("gem push") ||
      tool.input_command.contains("pip upload")

  # Detects cross-agent auth file reads.
  - name: is_gemini_auth_cross
    expression: tool.real_file_path.contains("/.gemini/oauth_creds") && agent.name != "gemini"
  - name: is_codex_auth_cross
    expression: tool.real_file_path.contains("/.codex/auth") && agent.name != "codex"
  - name: is_cursor_auth_cross
    expression: tool.real_file_path.contains("/.cursor/session") && agent.name != "cursor"
  - name: is_claude_auth_cross
    expression: tool.real_file_path.contains("/.claude/oauth") && agent.name != "claude_code"
  - name: is_cross_agent_auth_read
    expression: tool.name == "Read" && (is_gemini_auth_cross || is_codex_auth_cross || is_cursor_auth_cross || is_claude_auth_cross)

  # Detects installs referencing known IOC host domains.
  - name: is_mcp_install_from_untrusted
    expression: >
      (tool.input_command.contains("npx ") || tool.input_command.contains("npm install") ||
       tool.input_command.contains("uvx ") || tool.input_command.contains("pip install") ||
       tool.input_command.contains("claude skills install") || tool.input_command.contains("claude plugin install")) &&
      cmd_contains_ioc_domain

  # Detects MCP invocation from temporary folders.
  - name: is_mcp_temp_path
    expression: >
      (tool.input_command.contains("/tmp/") || tool.input_command.contains("/dev/shm/") || tool.input_command.contains("/var/tmp/")) &&
      (tool.input_command.contains("--stdio") || tool.input_command.contains("--sse"))

  # Checks if Glob searches target credentials.
  - name: is_credential_glob
    expression: >
      tool.name == "Glob" &&
      (tool.input.contains("/.aws/") || tool.input.contains("/.ssh/") ||
       tool.input.contains("/.gnupg/") || tool.input.contains("/.kube/") ||
       tool.input.contains("/id_rsa") || tool.input.contains("/id_ed25519") ||
       tool.input.contains("oauth_creds"))

  # Docker privilege escalation options.
  - name: is_container_privileged_flag
    expression: tool.input_command.contains("--privileged")
  - name: is_container_cap_add
    expression: tool.input_command.contains("--cap-add")
  - name: is_container_security_opt_unconfined
    expression: >
      tool.input_command.contains("seccomp==unconfined") || tool.input_command.contains("apparmor==unconfined") ||
      tool.input_command.contains("systempaths==unconfined") || tool.input_command.contains("label==disable") ||
      tool.input_command.contains("label:disable")
  - name: is_container_host_namespace
    expression: >
      tool.input_command.contains("--pid==host") || tool.input_command.contains("--pid host") ||
      tool.input_command.contains("--ipc==host") || tool.input_command.contains("--ipc host") ||
      tool.input_command.contains("--userns==host") || tool.input_command.contains("--userns host") ||
      tool.input_command.contains("--uts==host") || tool.input_command.contains("--uts host") ||
      tool.input_command.contains("--cgroupns==host") || tool.input_command.contains("--cgroupns host") ||
      tool.input_command.contains("--network==host") || tool.input_command.contains("--network host") ||
      tool.input_command.contains("--net==host") || tool.input_command.contains("--net host")
  - name: is_container_docker_socket
    expression: tool.input_command.contains("docker.sock") || tool.input_command.contains("DOCKER_HOST==")
  - name: is_container_host_root_mount
    expression: >
      tool.input_command.contains("-v /:") || tool.input_command.contains("--volume /:") ||
      tool.input_command.contains("source==/,") || tool.input_command.contains("src==/,")
  - name: is_container_device_passthrough
    expression: tool.input_command.contains("--device==/dev/") || tool.input_command.contains("--device /dev/")
  - name: is_nsenter_host
    expression: tool.input_command.contains("nsenter") && (tool.input_command.contains("-t 1") || tool.input_command.contains("--target 1") || tool.input_command.contains("-t1"))

  # Aggregated container breakout macro.
  - name: is_container_privilege_escalation
    expression: >
      is_container_privileged_flag || is_container_cap_add || is_container_security_opt_unconfined ||
      is_container_host_namespace || is_container_docker_socket || is_container_host_root_mount ||
      is_container_device_passthrough || is_nsenter_host

  # Checks if write targets MCP configuration files.
  - name: is_mcp_config_write
    expression: is_write_tool && tool.file_path != "" && (tool.file_name == ".mcp.json" || tool.file_name == "managed-mcp.json")

  # Detects MCP command points to temp paths or encoded parameters.
  - name: is_mcp_command_temp
    expression: >
      tool.input.contains("/tmp/") || tool.input.contains("/dev/shm/") ||
      tool.input.contains("/var/tmp/") || tool.input.contains("$TMPDIR") ||
      tool.input.contains("$TMP") || tool.input.contains("$TEMP") ||
      tool.input.contains("/run/user/")
  - name: is_mcp_command_encoded
    expression: tool.input.contains("base64")

  # Checks if agent is calling self-registration commands.
  - name: is_mcp_self_register
    expression: >
      tool.input_command.contains("claude mcp add") || tool.input_command.contains("claude mcp install") ||
      tool.input_command.contains("claude mcp add-json") || tool.input_command.contains("claude mcp add-from-claude-desktop") ||
      tool.input_command.contains("claude plugin install") || tool.input_command.contains("claude skill add")

  # Checks for skills/commands write paths.
  - name: is_skill_commands_path
    expression: tool.real_file_path.contains("/.claude/commands/")
  - name: is_skill_content_ioc
    expression: is_skill_commands_path && contains_ioc_domain
  - name: is_skill_pipe_bash
    expression: >
      is_skill_commands_path &&
      (tool.input.contains("| bash") || tool.input.contains("|bash") ||
       tool.input.contains("| sh") || tool.input.contains("|sh") ||
       tool.input.contains("bash <(") || tool.input.contains("sh <(") ||
       tool.input.contains("| /bin/bash") || tool.input.contains("|/bin/bash") ||
       tool.input.contains("| /bin/sh") || tool.input.contains("|/bin/sh") ||
       tool.input.contains("| /usr/bin/bash") || tool.input.contains("|/usr/bin/bash") ||
       tool.input.contains("| /usr/bin/sh") || tool.input.contains("|/usr/bin/sh"))

  # Checks if package install options bypass user confirmation dialogs.
  - name: is_npx_auto_accept_mcp_skill
    expression: >
      (tool.input_command.contains("npx -y ") || tool.input_command.contains("npx --yes ") ||
       tool.input_command.contains("bunx -y ") || tool.input_command.contains("bunx --yes ") ||
       tool.input_command.contains("yarn dlx ") || tool.input_command.contains("pnpm dlx ")) &&
      (tool.input_command.contains("mcp") || tool.input_command.contains("skill") ||
       tool.input_command.contains("plugin") || tool.input_command.contains("modelcontextprotocol") ||
       tool.input_command.contains("@anthropic") || tool.input_command.contains("@openai") ||
       tool.input_command.contains("@google"))

  # Bash command writing to skill/command dirs.
  - name: is_bash_commands_write
    expression: tool.name == "Bash" && tool.input_command.contains("/.claude/commands/")

  # Settings write.
  - name: is_claude_settings_write
    expression: >
      is_write_tool && tool.real_file_path != "" &&
      (tool.real_file_path.endsWith("/.claude/settings.json") || tool.real_file_path.endsWith("/.claude/settings.local.json"))

  # Content controls for settings hooks.
  - name: is_settings_hooks_content
    expression: tool.input.contains("hooks")
  - name: is_settings_mcp_content
    expression: tool.input.contains("mcpServers")

  # Git hooks writes.
  - name: is_git_hooks_write
    expression: is_write_tool && tool.real_file_path != "" && tool.real_file_path.contains("/.git/hooks/")
  - name: is_bash_git_hooks_write
    expression: tool.name == "Bash" && tool.input_command.contains("/.git/hooks/")

  # Registry redirects macros.
  - name: is_registry_config_write
    expression: is_write_tool && tool.file_path != "" && tool.file_name in registry_config_files
  - name: is_registry_redirect_content
    expression: >
      tool.input.contains("registry==") || tool.input.contains("npmRegistryServer") ||
      tool.input.contains("index-url") || tool.input.contains("extra-index-url") ||
      tool.input.contains("index-server")
  - name: is_bash_npm_registry_redirect
    expression: tool.input_command.contains("npm config set registry") || tool.input_command.contains("npm set registry")
  - name: is_bash_pip_registry_redirect
    expression: (tool.input_command.contains("pip config set") || tool.input_command.contains("pip3 config set")) && (tool.input_command.contains("index-url") || tool.input_command.contains("extra-index-url"))
  - name: is_bash_registry_redirect
    expression: is_bash_npm_registry_redirect || is_bash_pip_registry_redirect

  # Checks environmental API base URL overrides.
  - name: is_env_file_write
    expression: is_write_tool && tool.file_path != "" && tool.file_name in env_file_names
  - name: is_api_base_url_override
    expression: tool.input.contains("ANTHROPIC_BASE_URL") || tool.input.contains("OPENAI_BASE_URL") || tool.input.contains("OPENAI_API_BASE")
  - name: is_api_key_in_env
    expression: tool.input.contains("ANTHROPIC_API_KEY") || tool.input.contains("OPENAI_API_KEY") || tool.input.contains("GEMINI_API_KEY")

# =========================================================================
# SECTION 3: RULES
# Guardrail policies evaluated against agent tool invocations.
# =========================================================================

rules:
  # -------------------------------------------------------------------------
  # Working Directory / File Boundaries
  # -------------------------------------------------------------------------

  - name: Monitor activity outside working directory
    description: "Logs when a coding agent reads, writes, or edits files outside the session's working directory. Informational only — does not block."
    expression: tool.name in ["Write", "Edit", "Read"] && tool.real_file_path != "" && is_outside_cwd
    action: allow
    message: Model Armor detected access to %tool.real_file_path% which is outside the working directory %agent.real_cwd%

  - name: Ask before writing outside working directory
    description: "Requires user confirmation when a coding agent writes or edits a file outside the session's working directory. Excludes ~/.claude/ routine bookkeeping."
    expression: is_write_tool && tool.real_file_path != "" && is_outside_cwd && !is_sensitive_path && !is_claude_data_path
    action: ask
    message: Model Armor requires confirmation to write to %tool.real_file_path% because it is outside the working directory %agent.real_cwd%

  - name: Deny reading sensitive paths
    description: Blocks reads from sensitive filesystem locations such as ~/.ssh/, cloud credential directories, and environment variable files.
    expression: tool.name == "Read" && is_sensitive_path
    action: deny
    message: Model Armor blocked reading %tool.real_file_path% because it is a sensitive path

  - name: Deny writing to sensitive paths
    description: Blocks writes to sensitive filesystem locations such as /etc/, ~/.ssh/, and cloud credential directories.
    expression: is_write_tool && is_sensitive_path
    action: deny
    message: Model Armor blocked writing to %tool.real_file_path% because it is a sensitive path

  # -------------------------------------------------------------------------
  # Sandbox Evasion & Escapes
  # -------------------------------------------------------------------------

  - name: Ask before agent writing sandbox-disable configuration
    description: "Requires user confirmation when a coding agent writes or edits its own sandbox configuration file with content that may disable OS-level process isolation."
    expression: is_write_tool && tool.real_file_path != "" && is_agent_sandbox_config && is_sandbox_disable_content
    action: ask
    message: Model Armor requires confirmation before %agent.name% modifies its sandbox configuration at %tool.real_file_path%

  - name: Ask before Claude Code per-command sandbox escape
    description: "Requires user confirmation when Claude Code invokes the Bash tool with dangerouslyDisableSandbox set to true."
    expression: tool.name == "Bash" && tool.input.contains("dangerouslyDisableSandbox") && tool.input.contains("true")
    action: ask
    message: Model Armor requires confirmation before Claude Code runs an unsandboxed Bash command (%tool.input_command%)

  - name: Deny Bash command writing sandbox-disable content to agent settings file
    description: Blocks Bash commands that reference an agent settings file path combined with sandbox-disabling content.
    expression: tool.name == "Bash" && is_bash_sandbox_settings_path && is_bash_sandbox_disable_cmd
    action: deny
    message: Model Armor blocked %agent.name% from disabling its sandbox via Bash command:%tool.input_command%

  - name: Deny Codex CLI sandbox bypass flag
    description: Blocks Bash invocations of the Codex CLI with flags that bypass sandbox isolation.
    expression: tool.name == "Bash" && is_codex_sandbox_bypass
    action: deny
    message: Model Armor blocked %agent.name% from starting Codex with a sandbox bypass flag (%tool.input_command%)

  - name: Deny Gemini CLI sandbox disable via environment variable
    description: Blocks Bash commands that set GEMINI_SANDBOX to a disabling value.
    expression: tool.name == "Bash" && is_gemini_sandbox_env_bypass
    action: deny
    message: Model Armor blocked %agent.name% from disabling Gemini sandbox via environment variable (%tool.input_command%)

  - name: Deny Bash command replacing agent sandbox settings file
    description: "Blocks Bash commands that replace an agent sandbox settings file via cp, mv, or sed -i."
    expression: tool.name == "Bash" && is_bash_sandbox_settings_replace
    action: deny
    message: Model Armor blocked %agent.name% from replacing an agent sandbox settings file (%tool.input_command%)

  # -------------------------------------------------------------------------
  # Shell Command Injection & Host Abuse
  # -------------------------------------------------------------------------

  - name: Deny credential file access via Bash
    description: Blocks Bash commands that reference credential files or secret environment variable names.
    expression: is_bash && references_credential
    action: deny
    message: Model Armor blocked a Bash command referencing a credential path or secret token (%tool.input_command%)

  - name: Deny credential file access via Read tool
    description: Blocks Read tool calls targeting well-known credential file paths.
    expression: is_read_credential_path
    action: deny
    message: Model Armor blocked the Read tool accessing a credential file at %tool.real_file_path%

  - name: Deny destructive system commands
    description: Blocks shell commands whose substrings unambiguously indicate a destructive or privilege-elevating operation.
    expression: is_bash && is_destructive_command
    action: deny
    message: Model Armor blocked a destructive system command (%tool.input_command%)

  - name: Ask before potentially destructive shell commands
    description: Requires user confirmation before commands whose dangerous form overlaps with legitimate development workflows.
    expression: is_bash && is_likely_destructive_command && !is_pure_search_or_print_command
    action: ask
    message: Model Armor requires confirmation before a potentially destructive shell command (%tool.input_command%)

  - name: Ask before container privilege escalation or host breakout
    description: Requires user confirmation before Bash commands that grant a container host-equivalent power.
    expression: is_bash && is_container_privilege_escalation
    action: ask
    message: Model Armor requires confirmation before %agent.name% runs a container command that escalates privileges (%tool.input_command%)

  - name: Deny pipe to shell interpreter
    description: Blocks Bash commands that pipe network-fetched or generated content directly into a shell interpreter.
    expression: is_bash && is_pipe_to_shell
    action: deny
    message: Model Armor blocked piping content to a shell interpreter (%tool.input_command%)

  - name: Deny encoded payload execution
    description: Blocks execution of base64-decoded or hex-decoded payloads and inline interpreter one-liners.
    expression: is_bash && is_encoded_exec
    action: deny
    message: Model Armor blocked execution of a potentially encoded or inline-interpreted payload (%tool.input_command%)

  - name: Deny curl wget exfiltration
    description: Blocks outbound data transfers via curl or wget that POST, upload, or pipe data.
    expression: is_bash && is_curl_exfil
    action: deny
    message: Model Armor blocked a potential data exfiltration command via curl or wget (%tool.input_command%)

  - name: Ask before writing to tmp staging paths
    description: Requires user confirmation for Write and Edit operations targeting temp paths.
    expression: is_write_tool && tool.real_file_path != "" && is_tmp_path
    action: ask
    message: Model Armor requires confirmation before writing to the staging path %tool.real_file_path%

  - name: Deny reverse shell via Bash
    description: Blocks Bash commands that establish reverse shell connections.
    expression: is_bash && is_reverse_shell
    action: deny
    message: Model Armor blocked a reverse shell command (%tool.input_command%)

  - name: Deny cloud metadata service access via Bash
    description: Blocks curl and wget requests to cloud instance metadata services.
    expression: is_bash && is_imds_access
    action: deny
    message: Model Armor blocked access to a cloud metadata service (%tool.input_command%)

  - name: Deny credential directory archive via Bash
    description: Blocks shell commands that compress credential directories.
    expression: is_bash && is_credential_archive
    action: deny
    message: Model Armor blocked archiving a credential directory (%tool.input_command%)

  - name: Deny SSH reverse tunnel and SOCKS proxy
    description: Blocks SSH commands using reverse port forwarding, SOCKS proxy, or VPN tunnel flags.
    expression: is_bash && is_ssh_tunnel
    action: deny
    message: Model Armor blocked an SSH tunneling or proxy command (%tool.input_command%)

  - name: Ask before cron and scheduled task manipulation
    description: Requires confirmation before crontab modifications or writes targeting /etc/cron directories.
    expression: is_bash && is_cron_persistence
    action: ask
    message: Model Armor requires confirmation before modifying cron configuration (%tool.input_command%)

  - name: Deny audit trail destruction
    description: Blocks commands that wipe shell history.
    expression: is_bash && is_history_wipe
    action: deny
    message: Model Armor blocked a shell history wipe attempt (%tool.input_command%)

  - name: Deny package publish
    description: Blocks publishing commands across major ecosystems.
    expression: is_bash && is_package_publish
    action: deny
    message: Model Armor blocked a package publish command (%tool.input_command%)

  # -------------------------------------------------------------------------
  # Persistent Injection & Supply Chain Security
  # -------------------------------------------------------------------------

  - name: Ask before modifying shell startup files
    description: Requires confirmation when writing or editing shell startup files (.bashrc, .zshrc, etc.).
    expression: is_write_tool && tool.file_path != "" && tool.file_name in shell_startup_files
    action: ask
    message: Model Armor requires confirmation before modifying shell startup file %tool.real_file_path%

  - name: Ask before writing agent instruction files outside working directory
    description: Requires confirmation when writing or editing agent instruction files outside the working directory.
    expression: is_write_tool && tool.file_path != "" && tool.file_name in agent_instruction_files && tool.real_file_path != "" && is_outside_cwd
    action: ask
    message: Model Armor requires confirmation before writing agent instruction file %tool.real_file_path% outside working directory %agent.real_cwd%

  - name: Deny cross-agent authentication file access
    description: Blocks reads of another agent's OAuth or session credential files.
    expression: is_cross_agent_auth_read
    action: deny
    message: Model Armor blocked %agent.name% from reading another agent's authentication file %tool.real_file_path%

  - name: Deny MCP server or skill install from untrusted host
    description: Blocks package manager installation commands that reference known malicious code hosting sites.
    expression: is_bash && is_mcp_install_from_untrusted
    action: deny
    message: Model Armor blocked installing a package or skill from an untrusted host (%tool.input_command%)

  - name: Deny MCP server execution from temporary directory
    description: Blocks execution of processes using MCP transport flags from temp directories.
    expression: is_bash && is_mcp_temp_path
    action: deny
    message: Model Armor blocked executing a potential MCP server from a temporary directory (%tool.input_command%)

  - name: Ask before Glob with credential directory patterns
    description: Requires confirmation when the Glob tool is used with patterns that target credential directories.
    expression: is_credential_glob
    action: ask
    message: Model Armor requires confirmation before globbing with a credential-targeting pattern (%tool.input%)

  - name: Deny MCP config with command from temporary directory
    description: Blocks writing an MCP server configuration file where the server command field points to a temporary directory.
    expression: is_mcp_config_write && is_mcp_command_temp
    action: deny
    message: Model Armor blocked writing an MCP server config with a command path in temporary storage at %tool.real_file_path%

  - name: Deny MCP config with IOC domain in server URL
    description: Blocks writing an MCP server configuration file that includes a known malicious domain in the url field.
    expression: is_mcp_config_write && contains_ioc_domain
    action: deny
    message: Model Armor blocked writing an MCP server config with a malicious hosting domain in the server URL at %tool.real_file_path%

  - name: Ask before MCP config with encoded server command
    description: Requires user confirmation when writing an MCP server configuration file that contains the substring "base64".
    expression: is_mcp_config_write && is_mcp_command_encoded
    action: ask
    message: Model Armor requires confirmation before writing an MCP server config that references base64 at %tool.real_file_path%

  - name: Ask before agent self-registering MCP server
    description: Requires user confirmation when the agent invokes commands to self-register MCP servers or plugins.
    expression: tool.name == "Bash" && is_mcp_self_register
    action: ask
    message: Model Armor requires confirmation before the agent self-registers an MCP server or plugin (%tool.input_command%)

  - name: Ask before writing to Claude slash command directory
    description: Requires user confirmation when the agent writes or edits files under .claude/commands/.
    expression: is_write_tool && tool.real_file_path != "" && tool.real_file_path.contains("/.claude/commands/")
    action: ask
    message: Model Armor requires confirmation before writing a Claude slash command at %tool.real_file_path%

  - name: Ask before writing CLAUDE.md outside working directory
    description: Requires user confirmation when the agent writes or edits a CLAUDE.md file outside the current working directory.
    expression: is_write_tool && tool.file_path != "" && tool.file_name == "CLAUDE.md" && tool.real_file_path != "" && is_outside_cwd
    action: ask
    message: Model Armor requires confirmation before writing CLAUDE.md at %tool.real_file_path% outside working directory %agent.real_cwd%

  - name: Deny skill command file with IOC domain in content
    description: Blocks writing a skill or slash command file whose content references a known malicious domain.
    expression: is_write_tool && tool.real_file_path != "" && is_skill_content_ioc
    action: deny
    message: Model Armor blocked writing a skill file with a malicious hosting domain in its content at %tool.real_file_path%

  - name: Deny skill command file with pipe-to-shell in content
    description: Blocks writing a skill or slash command file whose content contains a pipe-to-shell pattern.
    expression: is_write_tool && tool.real_file_path != "" && is_skill_pipe_bash
    action: deny
    message: Model Armor blocked writing a skill file with a pipe-to-shell pattern in its content at %tool.real_file_path%

  - name: Ask before npx auto-accept MCP or skill installation
    description: Requires user confirmation when package install command bypasses the "install this package?" review step.
    expression: tool.name == "Bash" && is_npx_auto_accept_mcp_skill
    action: ask
    message: Model Armor requires confirmation before auto-accepting package installation for an MCP server or skill (%tool.input_command%)

  - name: Ask before Bash command writing to Claude slash command directory
    description: Requires user confirmation when a Bash command references the .claude/commands/ directory.
    expression: is_bash_commands_write
    action: ask
    message: Model Armor requires confirmation before a Bash command accesses the Claude slash command directory (%tool.input_command%)

  - name: Ask before writing to Claude Code subagent definitions directory
    description: Requires user confirmation when the agent writes or edits files under ~/.claude/agents/.
    expression: is_write_tool && tool.real_file_path != "" && tool.real_file_path.contains("/.claude/agents/")
    action: ask
    message: Model Armor requires confirmation before writing a Claude Code subagent definition at %tool.real_file_path%

  - name: Ask before writing to Claude Code skills directory
    description: Requires user confirmation when the agent writes or edits files under ~/.claude/skills/.
    expression: is_write_tool && tool.real_file_path != "" && tool.real_file_path.contains("/.claude/skills/")
    action: ask
    message: Model Armor requires confirmation before writing a Claude Code skill at %tool.real_file_path%

  - name: Ask before writing to Claude Code plugins directory
    description: Requires user confirmation when the agent writes or edits files under ~/.claude/plugins/.
    expression: is_write_tool && tool.real_file_path != "" && tool.real_file_path.contains("/.claude/plugins/")
    action: ask
    message: Model Armor requires confirmation before writing to Claude Code plugin storage at %tool.real_file_path%

  - name: Ask before writing to Claude Code settings backups directory
    description: Requires user confirmation when the agent writes or edits files under ~/.claude/backups/.
    expression: is_write_tool && tool.real_file_path != "" && tool.real_file_path.contains("/.claude/backups/")
    action: ask
    message: Model Armor requires confirmation before writing to Claude Code settings backups at %tool.real_file_path%

  - name: Ask before agent writing hooks into Claude Code settings
    description: Requires user confirmation when the agent writes or edits settings with hooks configuration.
    expression: is_claude_settings_write && is_settings_hooks_content
    action: ask
    message: Model Armor requires confirmation before %agent.name% writes a hooks entry into Claude Code settings at %tool.real_file_path%

  - name: Ask before agent registering MCP servers in Claude settings
    description: Requires user confirmation when the agent writes or edits settings with mcpServers configuration.
    expression: is_claude_settings_write && is_settings_mcp_content
    action: ask
    message: Model Armor requires confirmation before %agent.name% registers an MCP server in Claude Code settings at %tool.real_file_path%

  - name: Ask before writing to git hooks directory
    description: Requires user confirmation when the agent writes or edits a file inside a .git/hooks/ directory.
    expression: is_git_hooks_write
    action: ask
    message: Model Armor requires confirmation before writing a git hook at %tool.real_file_path%

  - name: Ask before writing package registry redirect
    description: Requires user confirmation when the agent redirects package manager config downloads to a custom registry.
    expression: is_registry_config_write && is_registry_redirect_content
    action: ask
    message: Model Armor requires confirmation before writing a package registry redirect to %tool.real_file_path%

  - name: Ask before API base URL override in environment file
    description: Requires user confirmation when environment files override AI base URLs.
    expression: is_env_file_write && is_api_base_url_override
    action: ask
    message: Model Armor requires confirmation before %agent.name% overrides an AI API base URL in %tool.real_file_path%

  - name: Ask before writing AI API key to environment file
    description: Requires user confirmation when environment files contain AI provider API key variables.
    expression: is_env_file_write && is_api_key_in_env
    action: ask
    message: Model Armor requires confirmation before %agent.name% writes an AI API key variable to %tool.real_file_path%

  - name: Ask before Bash command accessing git hooks directory
    description: Requires user confirmation when a Bash command references a .git/hooks/ directory path.
    expression: is_bash_git_hooks_write
    action: ask
    message: Model Armor requires confirmation before a Bash command accesses the git hooks directory (%tool.input_command%)

  - name: Ask before Bash command redirecting package registry
    description: Requires user confirmation when a Bash command redirects global package manager configs.
    expression: tool.name == "Bash" && is_bash_registry_redirect
    action: ask
    message: Model Armor requires confirmation before a Bash command redirects the package registry (%tool.input_command%)

  - name: Deny writes to Claude Code settings file
    description: Blocks Write/Edit on ~/.claude/settings.json.
    expression: is_write_tool && is_claude_settings_path
    action: deny
    message: Model Armor blocked writing to Claude Code settings at %tool.real_file_path%

  - name: Deny writes to Claude Code policy limits file
    description: Blocks Write/Edit on ~/.claude/policy-limits.json.
    expression: is_write_tool && tool.real_file_path.endsWith("/.claude/policy-limits.json")
    action: deny
    message: Model Armor blocked writing to Claude Code policy-limits.json at %tool.real_file_path%

  - name: Ask before reading Claude Code settings file
    description: Asks before the agent reads ~/.claude/settings.json.
    expression: tool.name == "Read" && is_claude_settings_path
    action: ask
    message: Model Armor requires confirmation to read Claude Code settings at %tool.real_file_path%
